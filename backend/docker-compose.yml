version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: sihp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sihp
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    # Healthcheck to ensure DB is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sihp-network

  app:
    build:
      context: .
      target: dev  # Use 'prod' for production
    container_name: sihp-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./:/app  # Mount source for hot reload in dev
    # Command is set in Dockerfile (air for dev)
    networks:
      - sihp-network

volumes:
  db_data:
    # Persistent volume for Postgres data

networks:
  sihp-network:
    driver: bridge
