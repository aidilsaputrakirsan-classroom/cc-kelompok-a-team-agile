version: '3.9'

services:
  frontend:
    image: arthurotj/sihp-fe:latest
    build:
      context: .
      target: prod
      args:
        # Empty string → fetch uses relative URL, nginx proxies /v1 to sihp-be
        VITE_API_BASE_URL: ""
        VITE_DEMO_EMAIL: ${VITE_DEMO_EMAIL:-admin@ikn.com}
        VITE_DEMO_PASSWORD: ${VITE_DEMO_PASSWORD:-ikn123}
    container_name: sihp-fe
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - sihp-network

  frontend-dev:
    build:
      context: .
      target: dev
    container_name: sihp-fe-dev
    restart: unless-stopped
    environment:
      # Vite proxy target — backend container from sihp-be stack
      BACKEND_URL: http://sihp-be:8080
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - sihp-network
    profiles:
      - dev

networks:
  sihp-network:
    external: true
    name: sihp-network
