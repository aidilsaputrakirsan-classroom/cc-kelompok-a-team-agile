server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — resolve upstream at request time, not at nginx startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy all /v1 API calls to the backend container
    location /v1 {
        set $backend_upstream http://sihp-be:8080;
        proxy_pass         $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html so new deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
